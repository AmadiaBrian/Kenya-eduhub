<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Street Gun — Short War (HTML/CSS/JS)</title>
  <style>
    :root{--bg:#0d0f14;--panel:#111217;--accent:#f75945;--muted:#9aa4b2}
    *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#0b0c10,#071018);color:#e6eef6}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:980px;max-width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.06));border-radius:12px;padding:14px;box-shadow:0 10px 40px rgba(2,6,23,0.7)}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    h1{font-size:18px;margin:0}
    .controls{display:flex;gap:8px;align-items:center}
    button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:inherit;padding:8px 10px;border-radius:8px;cursor:pointer}
    .game-area{display:flex;gap:12px}
    .game-pane{flex:1;background:linear-gradient(180deg,#0f1724,#071026);border-radius:8px;padding:12px;display:flex;flex-direction:column;align-items:center}
    canvas{background:linear-gradient(180deg,#1b1e24,#0f1116);border-radius:6px;display:block;width:100%;height:auto;max-height:600px}
    .sidebar{width:260px;min-width:220px;padding:12px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.04));}
    .stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,0.03)}
    .big{font-size:22px;font-weight:700}
    .small{font-size:13px;color:var(--muted)}
    .hud{display:flex;gap:8px;align-items:center}
    .touch-controls{display:none;margin-top:12px}
    .touch-row{display:flex;gap:10px}
    .touch-btn{flex:1;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);text-align:center;user-select:none}
    @media (max-width:920px){.game-area{flex-direction:column}.sidebar{width:100%}.touch-controls{display:block}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <h1>Street Gun — Short War</h1>
        <div class="controls">
          <button id="btnStart">Start</button>
          <button id="btnPause">Pause</button>
          <button id="btnSound">Sound: On</button>
          <button id="btnReset">Reset</button>
        </div>
      </header>
      <div class="game-area">
        <div class="game-pane">
          <canvas id="gameCanvas" width="900" height="520" aria-label="Street gun game canvas"></canvas>
          <footer style="margin-top:8px;font-size:12px;color:var(--muted)">Controls: A / ← = left, D / → = right, K / Space / Click = shoot, R = reload. Survive waves. Short, fast-paced.</footer>
        </div>
        <aside class="sidebar">
          <div class="stat"><div class="small">Score</div><div id="score" class="big">0</div></div>
          <div class="stat"><div class="small">High Score</div><div id="highScore" class="big">0</div></div>
          <div class="stat"><div class="small">Wave</div><div id="wave" class="big">0</div></div>
          <div class="stat"><div class="small">Health</div><div id="hp" class="big">100</div></div>
          <div class="stat"><div class="small">Ammo</div><div id="ammo" class="big">12 / 12</div></div>
          <div style="padding-top:10px" class="small">Tip: conserve ammo, use short bursts. Reload with R.</div>
          <div class="touch-controls">
            <div class="small" style="padding-top:8px">Touch Controls:</div>
            <div class="touch-row">
              <div class="touch-btn" id="touchLeft">◀︎</div>
              <div class="touch-btn" id="touchShoot">FIRE</div>
              <div class="touch-btn" id="touchRight">▶︎</div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <script>
    // Street Gun — Short War
    // Single-file HTML/CSS/JS short shooter: move left/right at bottom, shoot incoming enemies, survive waves.

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W = canvas.width, H = canvas.height;

    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnSound = document.getElementById('btnSound');
    const btnReset = document.getElementById('btnReset');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('highScore');
    const waveEl = document.getElementById('wave');
    const hpEl = document.getElementById('hp');
    const ammoEl = document.getElementById('ammo');

    const touchLeft = document.getElementById('touchLeft');
    const touchShoot = document.getElementById('touchShoot');
    const touchRight = document.getElementById('touchRight');

    let running = false, paused = false, lastTime = 0, soundOn = true;
    let score = 0, highScore = Number(localStorage.getItem('street_high') || 0), wave = 0;
    let player = {w:54,h:64,x:450,y: H-110,spd:420, hp:100, maxHp:100};
    let bullets = []; // {x,y,dx,dy,spd}
    let enemies = []; // {x,y,w,h,spd,type,hp}
    let particles = [];
    let ammo = 12, maxAmmo=12, reloading=false, reloadTime=1.2, reloadTimer=0;
    let shootCooldown = 0.14, shootTimer = 0;
    highEl.textContent = highScore;

    // audio
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function sfx(f=440,d=0.08,t='sine',g=0.06){ if(!soundOn) return; if(!audioCtx) audioCtx = new AudioCtx(); const o = audioCtx.createOscillator(); const gg = audioCtx.createGain(); o.type=t; o.frequency.value = f; gg.gain.value = g; o.connect(gg); gg.connect(audioCtx.destination); o.start(); gg.gain.setValueAtTime(g, audioCtx.currentTime); gg.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d + 0.02); }

    // controls
    const keys = {left:false,right:false,shoot:false};
    window.addEventListener('keydown', e=>{
      if(e.key === 'a' || e.key === 'A' || e.code === 'ArrowLeft') keys.left = true;
      if(e.key === 'd' || e.key === 'D' || e.code === 'ArrowRight') keys.right = true;
      if(e.key === 'k' || e.key === 'K' || e.code === 'Space') keys.shoot = true;
      if(e.key === 'r' || e.key === 'R') startReload();
      if(e.code === 'Space') e.preventDefault();
      if(e.code === 'KeyP') togglePause();
    });
    window.addEventListener('keyup', e=>{
      if(e.key === 'a' || e.key === 'A' || e.code === 'ArrowLeft') keys.left = false;
      if(e.key === 'd' || e.key === 'D' || e.code === 'ArrowRight') keys.right = false;
      if(e.key === 'k' || e.key === 'K' || e.code === 'Space') keys.shoot = false;
    });

    // mouse/touch
    canvas.addEventListener('mousedown', e=>{ keys.shoot=true; });
    window.addEventListener('mouseup', e=>{ keys.shoot=false; });
    touchLeft.addEventListener('touchstart', e=>{ e.preventDefault(); keys.left=true; }); touchLeft.addEventListener('touchend', e=>{ keys.left=false; });
    touchRight.addEventListener('touchstart', e=>{ e.preventDefault(); keys.right=true; }); touchRight.addEventListener('touchend', e=>{ keys.right=false; });
    touchShoot.addEventListener('touchstart', e=>{ e.preventDefault(); keys.shoot=true; }); touchShoot.addEventListener('touchend', e=>{ keys.shoot=false; });

    btnStart.addEventListener('click', startGame);
    btnPause.addEventListener('click', togglePause);
    btnSound.addEventListener('click', ()=>{ soundOn = !soundOn; btnSound.textContent = 'Sound: ' + (soundOn ? 'On' : 'Off'); });
    btnReset.addEventListener('click', resetAll);

    function startGame(){ if(!running){ running=true; paused=false; lastTime = performance.now(); score=0; wave=0; player.hp=player.maxHp; bullets=[]; enemies=[]; particles=[]; ammo=maxAmmo; reloading=false; shootTimer=0; waveStart(); requestAnimationFrame(loop); sfx(220,0.08,'sine',0.06); }}
    function togglePause(){ if(!running) return; paused = !paused; btnPause.textContent = paused ? 'Resume' : 'Pause'; }
    function resetAll(){ running=false; paused=false; bullets=[]; enemies=[]; particles=[]; score=0; wave=0; player.hp=player.maxHp; ammo=maxAmmo; localStorage.setItem('street_high', highScore); highEl.textContent = highScore; drawTitle(); }

    function startReload(){ if(reloading || ammo === maxAmmo) return; reloading = true; reloadTimer = 0; sfx(200,0.18,'triangle',0.08); }

    function waveStart(){ wave++; waveEl.textContent = wave; // spawn enemies by wave
      const count = Math.min(12, 3 + Math.floor(wave * 1.5));
      for(let i=0;i<count;i++){
        const t = Math.random() < 0.2 ? 'runner' : (Math.random() < 0.5 ? 'grunt' : 'heavy');
        spawnEnemy(t);
      }
    }

    function spawnEnemy(type){ const w = type==='heavy' ? 52 : (type==='runner' ? 32 : 40); const h = w + 10; const x = Math.random()*(W-120) + 60; const y = - (Math.random()*300 + 40);
      const base = type==='heavy' ? 40 : type==='runner' ? 120 : 70; const hp = type==='heavy' ? 40 : type==='runner' ? 12 : 20;
      enemies.push({x,y,w,h,spd:base + Math.random()*30, type, hp}); }

    function loop(now){ if(!running) return; const dt = Math.min(0.05, (now - lastTime)/1000); lastTime = now; if(!paused){ update(dt); } render(); if(running) requestAnimationFrame(loop); }

    function update(dt){ // player movement
      if(keys.left) player.x -= player.spd * dt; if(keys.right) player.x += player.spd * dt;
      player.x = Math.max(28, Math.min(W - player.w - 28, player.x));

      // reload
      if(reloading){ reloadTimer += dt; if(reloadTimer >= reloadTime){ ammo = maxAmmo; reloading = false; sfx(600,0.06,'sine',0.05); }}

      // shooting
      shootTimer -= dt; if(keys.shoot && shootTimer <= 0 && ammo > 0 && !reloading){ shootTimer = shootCooldown; shootBullet(); ammo--; sfx(880,0.04,'square',0.06); }
      if(ammo === 0 && !reloading){ startReload(); }

      // bullets
      for(let i=bullets.length-1;i>=0;i--){ const b = bullets[i]; b.y += b.dy * dt; b.x += b.dx * dt; b.life -= dt; if(b.life <= 0 || b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W+20){ bullets.splice(i,1); } }

      // enemies
      for(let i=enemies.length-1;i>=0;i--){ const e = enemies[i]; e.y += e.spd * dt;
        // simple AI: shift towards player slowly
        const dx = (player.x + player.w/2) - (e.x + e.w/2); e.x += Math.sign(dx) * Math.min(40 * dt, Math.abs(dx)*0.02);
        if(e.y > H + 60){ enemies.splice(i,1); continue; }
        // collision with player
        if(rectIntersect(e, player)){ // enemy hits player
          enemies.splice(i,1);
          player.hp -= e.type === 'heavy' ? 28 : 12; spawnParticles(player.x + player.w/2, player.y + player.h/2, 8);
          sfx(120,0.16,'sawtooth',0.14);
          if(player.hp <= 0){ player.hp = 0; gameOver(); return; }
        }
        // collision with bullets
        for(let j=bullets.length-1;j>=0;j--){ const b = bullets[j]; if(rectIntersect(b, e)){ bullets.splice(j,1); e.hp -= b.dmg; spawnParticles(b.x, b.y, 6); score += 6; if(e.hp <= 0){ // enemy killed
                  spawnParticles(e.x + e.w/2, e.y + e.h/2, 12); sfx(300,0.08,'sine',0.06); enemies.splice(i,1); score += 20; break; }
            } }
      }

      // particles
      for(let i=particles.length-1;i>=0;i--){ const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; p.vy += 420 * dt; if(p.life <= 0) particles.splice(i,1); }

      // wave complete?
      if(enemies.length === 0){ // small delay then start next wave
        setTimeout(()=>{ if(running && enemies.length === 0) waveStart(); }, 600);
      }

      // score/hp UI
      scoreEl.textContent = Math.floor(score);
      hpEl.textContent = Math.max(0, Math.floor(player.hp));
      ammoEl.textContent = (reloading ? 'Reloading...' : (ammo + ' / ' + maxAmmo));

      // highscore
      if(score > highScore){ highScore = Math.floor(score); localStorage.setItem('street_high', highScore); highEl.textContent = highScore; }
    }

    function shootBullet(){ const bx = player.x + player.w/2; const by = player.y + 8; const spread = (Math.random()-0.5)*8; bullets.push({x:bx, y:by, dx: spread*2, dy:-920, life:1.2, w:6,h:12, dmg:10}); }

    function spawnParticles(x,y,count){ for(let i=0;i<count;i++){ const a = Math.random()*Math.PI*2; const s = Math.random()*120 + 40; particles.push({x,y,vx:Math.cos(a)*s, vy:Math.sin(a)*s, life: 0.5 + Math.random()*0.6, size: 2 + Math.random()*3}); } }

    function gameOver(){ sfx(80,0.8,'sine',0.18); running = false; paused = false; setTimeout(()=>{ ctx.save(); ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='white'; ctx.textAlign='center'; ctx.font='36px system-ui'; ctx.fillText('You Died', W/2, H/2 - 10); ctx.font='18px system-ui'; ctx.fillText('Score: '+Math.floor(score)+'  —  High: '+highScore, W/2, H/2 + 18); ctx.font='14px system-ui'; ctx.fillText('Press Start to play again', W/2, H/2 + 48); ctx.restore(); }, 160); }

    function rectIntersect(a,b){ return !(a.x + (a.w||6) < b.x || a.x > b.x + (b.w||6) || a.y + (a.h||6) < b.y || a.y > b.y + (b.h||6)); }

    function render(){ ctx.clearRect(0,0,W,H);
      // background
      const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#16181d'); g.addColorStop(1,'#0b0c10'); ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

      // distant buildings (parallax)
      for(let i=0;i<6;i++){ ctx.fillStyle = 'rgba(20,24,34,'+(0.06 + i*0.01)+')'; const bw = 80 + (i%3)*40; const bh = 140 + (i*12); const bx = (i*160 + (performance.now()/20 % 160)) % (W+200) - 80; ctx.fillRect(bx, H - 260 - (i*6), bw, bh); }

      // street
      ctx.fillStyle='#0d0f12'; ctx.fillRect(0,H-120,W,120);
      // road marks
      ctx.fillStyle='rgba(255,255,255,0.03)'; for(let x=0;x<W;x+=40){ ctx.fillRect(x, H-70, 28, 6); }

      // particles
      for(const p of particles){ ctx.globalAlpha = Math.max(0, p.life/1.0); ctx.fillStyle='rgba(255,140,80,0.9)'; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1; }

      // enemies
      for(const e of enemies){ ctx.save(); ctx.fillStyle = e.type === 'heavy' ? '#9f2b2b' : e.type === 'runner' ? '#ffd166' : '#6b5cff'; roundRect(ctx, e.x, e.y, e.w, e.h, 6, true, false); // health bar
          ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x, e.y-8, e.w, 5); ctx.fillStyle='rgba(255,255,255,0.16)'; ctx.fillRect(e.x, e.y-8, e.w*(Math.max(0,e.hp)/(e.type==='heavy'?40:(e.type==='runner'?12:20))), 5);
        ctx.restore(); }

      // bullets
      for(const b of bullets){ ctx.fillStyle='#ffffff'; ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h); }

      // player
      ctx.save(); // shadow
      ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.beginPath(); ctx.ellipse(player.x + player.w/2, player.y + player.h + 6, player.w*0.6, 10, 0, 0, Math.PI*2); ctx.fill();
      // body
      ctx.fillStyle='#3ecf8e'; roundRect(ctx, player.x, player.y, player.w, player.h, 8, true, false);
      // visor
      ctx.fillStyle='rgba(0,0,0,0.12)'; roundRect(ctx, player.x + 10, player.y + 10, player.w - 20, 18, 6, true, false);
      ctx.restore();

      // UI overlay
      ctx.save(); ctx.font='14px system-ui'; ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.textAlign='left'; ctx.fillText('Score: '+Math.floor(score), 12, 22); ctx.textAlign='right'; ctx.fillText('Wave: '+wave, W-12, 22); ctx.restore();
    }

    function roundRect(ctx,x,y,w,h,r,fill,stroke){ if(typeof r==='undefined') r=6; if(typeof r==='number') r={tl:r,tr:r,br:r,bl:r}; ctx.beginPath(); ctx.moveTo(x+r.tl,y); ctx.lineTo(x+w-r.tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr); ctx.lineTo(x+w,y+h-r.br); ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h); ctx.lineTo(x+r.bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl); ctx.lineTo(x,y+r.tl); ctx.quadraticCurveTo(x,y,x+r.tl,y); ctx.closePath(); if(fill) ctx.fill(); if(stroke) ctx.stroke(); }

    // canvas resize
    function resizeCanvas(){ const ratio = window.devicePixelRatio || 1; const rect = canvas.getBoundingClientRect(); canvas.width = Math.min(1200, Math.floor((rect.width || 900) * ratio)); canvas.height = Math.min(800, Math.floor((rect.height || 520) * ratio)); W = canvas.width; H = canvas.height; player.y = H - 110; player.l = 28; }
    window.addEventListener('resize', ()=>{ resizeCanvas(); render(); }); resizeCanvas(); drawTitle();

    function drawTitle(){ ctx.clearRect(0,0,W,H); ctx.save(); ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='white'; ctx.textAlign='center'; ctx.font='20px system-ui'; ctx.fillText('Street Gun — Short War', W/2, H/2 - 20); ctx.font='14px system-ui'; ctx.fillText('Quick waves. Move, shoot, reload. Press Start to play.', W/2, H/2 + 6); ctx.restore(); }

    // initial small ambient enemy spawn when idle
    setInterval(()=>{ if(!running && Math.random()<0.35) spawnEnemy('grunt'); render(); }, 900);

  </script>
</body>
</html>
